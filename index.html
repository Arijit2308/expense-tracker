<!DOCTYPE html>
<html>
	<head>
		<title>EXPENSE TRACKER APP</title>
		<link rel = "stylesheet" href = "style.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
	</head>
	<body>
		<div class = "maindiv">
			<div class = "showdiv">
				<div class = "alldiv" id = "income">
				<h2 class = "heading">INCOME</h2>
				<h2 class = "num" id = "incnum">0</h2>
				
				</div>
				<div class = "alldiv" id = "expense">
				<h2 class = "heading">EXPENSE</h2>
				<h2 class = "num" id = "expnum">0</h2>
				</div>
				<div class = "alldiv" id = "budget">
				<h2 class = "heading">BUDGET</h2>
				<h2 class = "num" id = "bugnum">0</h2>
				</div>
			</div>
			<div class = "contdiv">
				<div class = "adddiv">
					<div id="addhead-container">
						<h3 id="addhead">ADD NEW</h3>

						<label class="switch">
							<input type="checkbox" id="theme-toggle">
							<span class="slider"></span>
						</label>
					</div>
					<p id = "selsecbtn">ENTRY TYPE</p>
					<div id = "togbtn">
						<button class = "allbtn" id = "inc" onclick = "addincome()">INCOME</button>
						<button class = "allbtn" id = "exp" onclick = "addexpense()">EXPENSE</button>
					</div>
					<form>
						<div class = "feadiv">
							<p>DESCRIPTION</p>
							<input type = "text" placeholder = "enter a short description" class = "inputs" id = "incinput">
							<p>AMOUNT</p>
							<input type = "number" placeholder = "enter the amount" class = "inputs" id = "amountinput">
							<p>CATEGORY</p>
							<select name = "catagory" id = "catg">
								<option>Salary</option>
								<option>Bonus</option>
								<option>Refund</option>
								<option>Business</option>
								<option>Freelancing</option>
								<option>Others</option>
							</select>
							<p>DATE</p>
							<input type = "date" class = "inputs" id = "datebox">
						</div>
						<div id = "btndiv">
							<input class = "srbtn" value = "Submit" type = "button" id = "submit" onclick = "submittask()"/>
							<input class = "srbtn" value = "Edit" type = "button" id = "edit" onclick = "editTask()"/>
							<input type="reset" class="srbtn" id = "resetbtn" />
						</div>
					</form>
				</div>
				<div class = "expdiv">
					<div id = "specialbtn">
						<button class = "feabtns" onclick = "showall()">All</button>
						<button class = "feabtns" onclick = "showExpense()">Expenses</button>
						<button class = "feabtns" onclick = "showIncome()">Incomes</button>
						<button class = "feabtns" onclick = "delall()">Del all</button>
					</div>
					<div id = "taskdiv">
						<ul id = "task">
						</ul>
					</div>
				</div>
			</div>
		</div>
		<script src="script.js"></script>
	</body>
</html>
